name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  ci:
    name: Lint + Typecheck + Test + Build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # website/ is npm-managed (not a pnpm workspace member) but the root
      # typecheck chain includes `pnpm --dir website typecheck`, so its deps
      # must be present (mirrors docs.yml).
      - name: Install website dependencies
        working-directory: website
        run: npm install --no-audit --no-fund

      # Native modules (better-sqlite3 in particular) are handled by
      # apps/desktop/scripts/ensure-native-abi.mjs: postinstall builds for the
      # Electron ABI and writes a sentinel, and the pretest/predev/prebuild
      # hooks rebuild only on an ABI switch — no explicit rebuild step needed.

      # Note: `pnpm check-placeholders` runs in .github/workflows/release-readiness.yml,
      # which is gated on release tags + manual dispatch so unfilled placeholders block
      # releases (the intended gate) without blocking every PR.

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      # website/ is npm-managed and excluded from `pnpm -r build`, so the root
      # Build step never renders its MDX. `next build` runs the full SSG pass
      # and fails on render errors (e.g. an MDX component used without an
      # import) that typecheck alone cannot catch.
      - name: Build website
        working-directory: website
        run: npm run build

      # The desktop binary must be present at out/main/index.cjs — the Build
      # step above runs `pnpm build` which invokes electron-vite for the
      # @opencodex/desktop workspace. e2e is gated to ubuntu-latest because
      # Windows runners flake on Electron+Playwright session teardown.
      - name: Install Playwright Electron deps (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb
      - name: Playwright e2e (Linux only)
        if: matrix.os == 'ubuntu-latest'
        run: xvfb-run --auto-servernum pnpm --filter @opencodex/desktop run e2e

      # Phase 14 — renderer perf budget. Records cold-start + keystroke p95
      # into apps/desktop/.bench/<timestamp>.json. Runs on Linux only for the
      # same xvfb / teardown reasons as e2e. The script self-fails on >10%
      # regression once a committed baseline.json exists; otherwise it just
      # records the artifact.
      - name: Renderer perf bench (Linux only)
        if: matrix.os == 'ubuntu-latest'
        run: xvfb-run --auto-servernum pnpm --filter @opencodex/desktop run bench
        continue-on-error: true

      - name: Upload perf artifact
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v6
        with:
          name: renderer-perf-bench
          path: apps/desktop/.bench/*.json
          if-no-files-found: ignore
