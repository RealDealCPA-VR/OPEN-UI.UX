name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  ci:
    name: Lint + Typecheck + Test + Build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Rebuild native modules
        id: rebuild_native
        continue-on-error: true
        run: pnpm --filter @opencodex/desktop run rebuild-native

      - name: Warn on rebuild-native failure
        if: steps.rebuild_native.outcome == 'failure'
        run: echo "::warning::rebuild-native failed — DB-backed tests will be skipped"

      - name: Check placeholders
        run: pnpm check-placeholders

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Format check
        run: pnpm format:check

      - name: Build
        run: pnpm build
