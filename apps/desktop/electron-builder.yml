appId: org.opencodex.desktop
productName: OpenCodex
copyright: Copyright (c) OpenCodex contributors
files:
  - out/**/*
  - package.json
  - '!**/*.{md,ts,map}'
extraResources:
  - from: build/icon.png
    to: icon.png
  - from: ../../packages/runner-claude-code/dist
    to: plugins/runner-claude-code/dist
  - from: ../../packages/runner-claude-code/opencodex.plugin.json
    to: plugins/runner-claude-code/opencodex.plugin.json
  - from: ../../packages/runner-opencode/dist
    to: plugins/runner-opencode/dist
  - from: ../../packages/runner-opencode/opencodex.plugin.json
    to: plugins/runner-opencode/opencodex.plugin.json
  - from: ../../packages/runner-aider/dist
    to: plugins/runner-aider/dist
  - from: ../../packages/runner-aider/opencodex.plugin.json
    to: plugins/runner-aider/opencodex.plugin.json
directories:
  output: release
  buildResources: build
asar: true
mac:
  category: public.app-category.developer-tools
  target:
    - target: dmg
      arch: [x64, arm64]
    - target: zip
      arch: [x64, arm64]
  artifactName: ${productName}-${version}-${arch}.${ext}
win:
  target:
    - target: nsis
      arch: [x64]
    - target: portable
      arch: [x64]
  artifactName: ${productName}-Setup-${version}.${ext}
nsis:
  oneClick: false
  allowToChangeInstallationDir: true
  perMachine: false
linux:
  category: Development
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
    - target: rpm
      arch: [x64]
    - target: snap
      arch: [x64]
  artifactName: ${productName}-${version}-${arch}.${ext}
# Snap Store publishing: `snapcraft login --with` consumes
# $SNAPCRAFT_STORE_CREDENTIALS at build time. CI exports it from the
# `SNAPCRAFT_STORE_CREDENTIALS` secret before invoking electron-builder.
# `${env.SNAP_CHANNEL}` defaults to `stable` in release.yml.
snap:
  publish:
    provider: snapStore
    channels:
      - ${env.SNAP_CHANNEL}
# Autoupdater channel pinned to `latest` so electron-updater reads
# `latest-{platform}.yml` from the GitHub release. Switch to `beta` for
# pre-release channels via a separate publish profile.
# `releaseType` is driven by $OPENCODEX_RELEASE_TYPE so CI can flip between
# `draft` (default, for review) and `release` (auto-promote). The companion
# `promote-release.yml` workflow flips a draft to a published release without
# rebuilding.
publish:
  provider: github
  channel: latest
  releaseType: ${env.OPENCODEX_RELEASE_TYPE}
