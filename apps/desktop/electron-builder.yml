appId: org.opencodex.desktop
productName: OpenCodex
copyright: Copyright (c) OpenCodex contributors
files:
  - out/**/*
  - package.json
  - '!**/*.{md,ts,map}'
extraResources:
  - from: build/icon.png
    to: icon.png
directories:
  output: release
  buildResources: build
asar: true
mac:
  category: public.app-category.developer-tools
  target:
    - target: dmg
      arch: [x64, arm64]
    - target: zip
      arch: [x64, arm64]
  artifactName: ${productName}-${version}-${arch}.${ext}
win:
  target:
    - target: nsis
      arch: [x64]
    - target: portable
      arch: [x64]
  artifactName: ${productName}-Setup-${version}.${ext}
nsis:
  oneClick: false
  allowToChangeInstallationDir: true
  perMachine: false
linux:
  category: Development
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
    - target: rpm
      arch: [x64]
  artifactName: ${productName}-${version}-${arch}.${ext}
publish:
  provider: github
  releaseType: draft
